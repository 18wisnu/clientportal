version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: client-portal-app
    container_name: client-portal-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - client-portal-network

  web:
    image: nginx:alpine
    container_name: client-portal-web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - client-portal-network

  db:
    image: mysql:8.0
    container_name: client-portal-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: client_portal
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: password
      MYSQL_USER: user
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - client-portal-network

networks:
  client-portal-network:
    driver: bridge

volumes:
  db_data:
